name: CI

on:
    push:
        branches:
            - main
            - master
    pull_request:

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9.12.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Server build
              run: pnpm --filter @miaoma-doc/server build

            - name: Server typecheck
              run: pnpm --filter @miaoma-doc/server typecheck

            - name: Server lint
              run: pnpm --filter @miaoma-doc/server lint

            - name: Web typecheck
              run: pnpm --filter @miaoma-doc/web typecheck

            - name: Web lint
              run: pnpm --filter @miaoma-doc/web lint

            - name: Server tests
              run: pnpm --filter @miaoma-doc/server test

            - name: Web tests
              run: pnpm --filter @miaoma-doc/web test
