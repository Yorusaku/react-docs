services:
    miaoma-docs-postgresql:
        image: bitnami/postgresql:latest
        container_name: miaoma-docs-postgresql
        ports:
            - '5433:5432'
        environment:
            - POSTGRESQL_USERNAME=postgres
            - POSTGRESQL_PASSWORD=xiaoer
            - POSTGRESQL_DATABASE=postgres
            - POSTGRESQL_TIMEZONE=Asia/Shanghai
            - POSTGRESQL_LOG_TIMEZONE=Asia/Shanghai
        # Windows 下用 named volume 更稳，避免 bind mount 触发权限/属主问题
        volumes:
            - miaoma_docs_postgresql_data:/bitnami/postgresql

networks:
    default:
        name: miaoma-docs-network
        driver: bridge

volumes:
    miaoma_docs_postgresql_data:
